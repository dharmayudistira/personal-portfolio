name: Update work timestamps

on:
  push:
    branches: [main]

jobs:
  update-timestamps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update updatedAt timestamps
        run: node scripts/update-works-timestamp.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add lib/data/works.ts && git commit -m "chore(works): bump updatedAt timestamps")
          git push
